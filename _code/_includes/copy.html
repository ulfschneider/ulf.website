<button id="{{copyId}}" class="js py-0 px-xs text-sm">Copy</button>
<script>
  document.querySelector("#{{copyId}}").addEventListener("click", () => {
    if ("{{copyContentId}}") {
      e = document.querySelector("#{{copyContentId}}")
      if (e) {
        navigator.clipboard.writeText(e.innerText)
      }
    } else {
      navigator.clipboard.writeText("{{copyText}}")
    }
  })
</script>
